version: '3.8'

services:
  refill-bot:
    build: .
    container_name: refill-bot
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow
      - PYTHONUNBUFFERED=1
      - BOT_INR_TOKEN=${BOT_INR_TOKEN}
      - BOT_OTHER_TOKEN=${BOT_OTHER_TOKEN}
    volumes:
      - ./logs:/app/logs
      - ./agents.json:/app/agents.json
      - ./service_account.json:/app/service_account.json:ro
      - ./.env:/app/.env:ro
    networks:
      - refill-network
    # Запускаем только ОДИН контейнер, который управляет обоими ботами
    command: ["python", "main.py"]

networks:
  refill-network:
    driver: bridge
