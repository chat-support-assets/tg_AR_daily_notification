version: '3.8'

services:
  refill-bot:
    build: .
    container_name: refill-bot
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
      - ./agents.json:/app/agents.json
      - ./service_account.json:/app/service_account.json:ro
      - ./.env:/app/.env:ro
    networks:
      - refill-network
    # Для обычного режима (прослушивание)
    command: ["python", "main.py"]

networks:
  refill-network:
    driver: bridge
